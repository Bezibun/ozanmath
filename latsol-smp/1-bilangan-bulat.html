<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozanmath - Kuis Bilangan Bulat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-glow: rgba(6, 182, 212, 0.5);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0fdfa; /* Cyan-50 */
        }
        .cyan-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px var(--cyan-glow);
            transform: translateY(-2px);
        }
        .level-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .level-card:hover {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
        }
        .level-card:hover .icon-bg {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .level-card:hover .badge-cyan {
            background: white;
            color: #06b6d4;
        }
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:active {
            transform: scale(0.98);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen">

    <div id="app" class="max-w-3xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="text-center mb-16 relative">
            <div class="inline-block relative">
                <div class="absolute -inset-1 bg-cyan-500 rounded-2xl blur opacity-30 float-anim"></div>
                <div class="relative flex items-center justify-center space-x-3 bg-white px-6 py-3 rounded-2xl shadow-sm border border-cyan-100">
                    <h1 class="text-4xl font-black tracking-tighter text-slate-800">Ozan<span class="text-cyan-500">math.</span></h1>
                </div>
            </div>
            <p class="text-cyan-700/60 font-semibold mt-6 tracking-wide uppercase text-xs">Modern Math Learning Platform</p>
        </header>

        <!-- Start Screen -->
        <div id="start-screen" class="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-slate-800">Pilih Level Kamu</h2>
                <div class="h-1 w-12 bg-cyan-500 mx-auto mt-2 rounded-full"></div>
            </div>
            
            <div class="grid gap-4">
                <!-- Level Buttons -->
                <button onclick="startQuiz('mudah')" class="level-card group flex items-center p-6 bg-white rounded-3xl border border-cyan-100 shadow-sm hover:shadow-2xl hover:shadow-cyan-200/50">
                    <div class="icon-bg w-14 h-14 bg-cyan-50 text-cyan-500 rounded-2xl flex items-center justify-center transition-all mr-6">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-extrabold text-lg">Pemula</h3>
                        <p class="text-sm opacity-60">Operasi (+) dan (-) dasar</p>
                    </div>
                    <span class="badge-cyan text-[10px] font-black bg-cyan-100 text-cyan-600 px-3 py-1 rounded-full uppercase tracking-tighter transition-all">Easy</span>
                </button>

                <button onclick="startQuiz('sedang')" class="level-card group flex items-center p-6 bg-white rounded-3xl border border-cyan-100 shadow-sm hover:shadow-2xl hover:shadow-cyan-200/50">
                    <div class="icon-bg w-14 h-14 bg-cyan-50 text-cyan-500 rounded-2xl flex items-center justify-center transition-all mr-6">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-extrabold text-lg">Menengah</h3>
                        <p class="text-sm opacity-60">Perkalian dan Pembagian</p>
                    </div>
                    <span class="badge-cyan text-[10px] font-black bg-cyan-100 text-cyan-600 px-3 py-1 rounded-full uppercase tracking-tighter transition-all">Normal</span>
                </button>

                <button onclick="startQuiz('susah')" class="level-card group flex items-center p-6 bg-white rounded-3xl border border-cyan-100 shadow-sm hover:shadow-2xl hover:shadow-cyan-200/50">
                    <div class="icon-bg w-14 h-14 bg-cyan-50 text-cyan-500 rounded-2xl flex items-center justify-center transition-all mr-6">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-extrabold text-lg">Expert</h3>
                        <p class="text-sm opacity-60">Logika Soal Cerita Kompleks</p>
                    </div>
                    <span class="badge-cyan text-[10px] font-black bg-cyan-100 text-cyan-600 px-3 py-1 rounded-full uppercase tracking-tighter transition-all">Hard</span>
                </button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="flex items-center justify-between mb-8 px-2">
                <div class="flex items-center space-x-3">
                    <div id="status-dot" class="w-3 h-3 bg-cyan-500 rounded-full animate-pulse"></div>
                    <span id="difficulty-name" class="text-xs font-black text-cyan-600 uppercase tracking-widest">LEVEL: PEMULA</span>
                </div>
                <div class="text-right">
                    <span id="question-count" class="text-2xl font-black text-slate-800">1<span class="text-slate-300 text-lg">/5</span></span>
                </div>
            </div>

            <!-- Modern Progress -->
            <div class="w-full h-3 bg-cyan-100 rounded-full mb-10 overflow-hidden p-1">
                <div id="progress-bar" class="h-full bg-cyan-500 rounded-full transition-all duration-700 shadow-[0_0_10px_#06b6d4]" style="width: 20%"></div>
            </div>

            <div class="cyan-glass rounded-[2.5rem] p-10 shadow-2xl shadow-cyan-100/20 border border-white">
                <div id="question-text" class="text-2xl sm:text-3xl font-bold text-center text-slate-800 leading-tight mb-12 min-h-[100px] flex items-center justify-center">
                    Memuat pertanyaan...
                </div>
                
                <div id="options-grid" class="grid gap-4 sm:grid-cols-2">
                    <!-- Dinamis -->
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden animate-in zoom-in duration-500">
            <div class="cyan-glass rounded-[3.5rem] p-12 shadow-2xl shadow-cyan-200 border border-white text-center">
                <div class="mb-10 relative inline-block">
                    <div class="absolute inset-0 bg-cyan-500 blur-3xl opacity-20"></div>
                    <div class="relative w-48 h-48 rounded-full border-[12px] border-cyan-50 flex flex-col items-center justify-center bg-white shadow-inner">
                        <span id="result-score" class="text-7xl font-black text-cyan-500 leading-none">0</span>
                        <span class="text-[10px] font-bold text-cyan-300 tracking-[0.3em] mt-2">TOTAL SKOR</span>
                    </div>
                </div>

                <h2 class="text-3xl font-black text-slate-800 mb-6">Analisis Performa</h2>
                <div id="analysis-box" class="bg-cyan-500/5 rounded-3xl p-8 mb-10 text-cyan-800 font-semibold leading-relaxed text-lg border border-cyan-100">
                    <!-- Dinamis -->
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="resetQuiz()" class="glow-hover py-5 bg-cyan-500 text-white font-black rounded-2xl shadow-lg shadow-cyan-200 uppercase tracking-widest text-xs">
                        Ulangi
                    </button>
                    <button onclick="location.reload()" class="py-5 bg-white text-cyan-500 border-2 border-cyan-500 font-black rounded-2xl hover:bg-cyan-50 uppercase tracking-widest text-xs transition-all">
                        Menu Utama
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const quizData = {
            mudah: [
                { q: "Berapa hasil dari 12 + (-8)?", a: ["4", "20", "-4", "-20"], correct: 0 },
                { q: "Hasil dari -15 - (-5) adalah...", a: ["-20", "-10", "10", "20"], correct: 1 },
                { q: "Urutan bilangan dari yang terkecil: -3, 0, -7, 2", a: ["-7, -3, 0, 2", "0, -3, -7, 2", "2, 0, -3, -7", "-3, -7, 0, 2"], correct: 0 },
                { q: "Lawan dari bilangan -50 adalah...", a: ["0", "1/50", "50", "-50"], correct: 2 },
                { q: "Hasil dari -7 + (-3) adalah...", a: ["4", "-4", "10", "-10"], correct: 3 }
            ],
            sedang: [
                { q: "Hasil dari -6 x (-7) adalah...", a: ["-42", "42", "13", "-13"], correct: 1 },
                { q: "Berapa hasil dari 48 : (-6)?", a: ["8", "-8", "7", "-7"], correct: 1 },
                { q: "Hitunglah: -10 + 20 : (-5)", a: ["-2", "-14", "2", "-6"], correct: 1 },
                { q: "Hasil dari (-12 + 4) x (-3) adalah...", a: ["-24", "24", "-16", "16"], correct: 1 },
                { q: "Suhu udara 10°C, turun 15°C. Suhu sekarang?", a: ["5°C", "-5°C", "-25°C", "25°C"], correct: 1 }
            ],
            susah: [
                { q: "Kapal selam di kedalaman 30m, naik 10m, turun lagi 5m. Posisi?", a: ["-25m", "-35m", "-45m", "-15m"], correct: 0 },
                { q: "Hasil dari [-20 + (10 x -2)] : -4 adalah...", a: ["-10", "10", "0", "40"], correct: 1 },
                { q: "Skor: Benar (+4), Salah (-2), Kosong (-1). Budi menjawab 5 soal: 4 Benar, 1 Salah. Skor?", a: ["14", "16", "12", "15"], correct: 0 },
                { q: "Hasil dari -50 - 100 : (-10) + (-20) adalah...", a: ["-60", "-70", "-40", "-30"], correct: 0 },
                { q: "Suhu es -5°C. Naik 3°C tiap 2 menit. Suhu setelah 10 menit?", a: ["5°C", "10°C", "15°C", "8°C"], correct: 1 }
            ]
        };

        let currentLvl = '';
        let qIdx = 0;
        let score = 0;

        function startQuiz(lvl) {
            currentLvl = lvl;
            qIdx = 0;
            score = 0;
            document.getElementById('difficulty-name').textContent = `LEVEL: ${lvl}`;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = quizData[currentLvl][qIdx];
            const qText = document.getElementById('question-text');
            const qCount = document.getElementById('question-count');
            const prog = document.getElementById('progress-bar');
            const grid = document.getElementById('options-grid');

            qText.textContent = data.q;
            qCount.innerHTML = `${qIdx + 1}<span class="text-slate-300 text-lg">/5</span>`;
            prog.style.width = `${((qIdx + 1) / 5) * 100}%`;
            
            grid.innerHTML = '';
            data.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn group p-6 text-left bg-white border border-cyan-100 rounded-3xl hover:border-cyan-500 hover:bg-cyan-50 shadow-sm transition-all";
                btn.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-xl bg-cyan-100 text-cyan-500 flex items-center justify-center font-black mr-4 group-hover:bg-cyan-500 group-hover:text-white transition-colors">
                            ${String.fromCharCode(65 + i)}
                        </div>
                        <span class="font-bold text-slate-700">${opt}</span>
                    </div>
                `;
                btn.onclick = () => handleChoice(i);
                grid.appendChild(btn);
            });
        }

        function handleChoice(i) {
            if (i === quizData[currentLvl][qIdx].correct) score += 20;
            
            if (qIdx < 4) {
                qIdx++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            // Score animation
            let startVal = 0;
            const timer = setInterval(() => {
                if (startVal >= score) clearInterval(timer);
                document.getElementById('result-score').textContent = startVal;
                if(score > 0) startVal += 2;
            }, 30);

            const analysisBox = document.getElementById('analysis-box');
            let msg = "";
            if (score === 100) msg = "🔥 JENIUS! Penguasaan materi kamu di level " + currentLvl + " sangat sempurna. Tidak ada satu pun kesalahan!";
            else if (score >= 60) msg = "⚡ MANTAP! Kamu sudah memahami konsep dasar dengan baik. Tingkatkan ketelitian agar skor kamu bisa maksimal!";
            else msg = "📖 SEMANGAT! Kamu butuh lebih banyak latihan soal di level " + currentLvl + ". Coba ulangi kuis ini untuk mengasah ingatanmu.";
            
            analysisBox.textContent = msg;
        }

        function resetQuiz() {
            document.getElementById('result-screen').classList.add('hidden');
            startQuiz(currentLvl);
        }
    </script>
</body>
</html>
